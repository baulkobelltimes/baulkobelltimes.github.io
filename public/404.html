<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baulko Bell Times</title>
    <script>
      // GitHub Pages 404 redirect workaround for SPA routing
      // Capture the requested path and store it before redirecting to index.html
      (function(){
        var path = location.pathname;
        // Only redirect if it's not already at root and not the 404 page itself
        if (path !== '/' && !path.includes('/404.html')) {
          sessionStorage.redirect = path;
          location.href = '/';
        }
      }());
    </script>
  </head>
  <body></body>
</html>
