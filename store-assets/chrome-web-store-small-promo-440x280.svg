    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(408 36) rotate(144) scale(240 210)">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.54"/>
