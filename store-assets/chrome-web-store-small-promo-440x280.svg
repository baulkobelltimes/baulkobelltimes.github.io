    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1f2a44" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="440" height="280" rx="28" fill="url(#bg)"/>
  <rect width="440" height="280" rx="28" fill="url(#glowA)"/>
