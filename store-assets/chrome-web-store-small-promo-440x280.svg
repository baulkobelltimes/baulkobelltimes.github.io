  <rect x="1" y="1" width="438" height="278" rx="27" fill="none" stroke="#ffffff" stroke-opacity="0.6"/>

  <rect x="24" y="44" width="146" height="192" rx="30" fill="#ffffff" fill-opacity="0.94" filter="url(#softShadow)"/>
  <rect x="36" y="56" width="122" height="168" rx="24" fill="#f6f8ff" stroke="#dbe5ff"/>

